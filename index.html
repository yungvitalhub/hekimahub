<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hekima Ebooks - Ancient Wisdom & Spirituality</title>
  
  <!-- Tailwind CSS & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInBottom { from { transform: translateY(2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.7s ease-out forwards; }
    .animate-slide-in-right { animation: slideInRight 0.5s ease-out forwards; }
    .animate-slide-in-bottom { animation: slideInBottom 0.8s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
    
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }

    .blur-text { filter: blur(5px); opacity: 0.4; user-select: none; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-yellow-500/30 min-h-screen">

  <!-- Navigation -->
  <nav class="sticky top-0 z-40 w-full backdrop-blur-md bg-slate-950/80 border-b border-slate-800/50">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center gap-2 cursor-pointer group" onclick="app.navigate('home')">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center shadow-lg shadow-yellow-900/20 group-hover:scale-105 transition-transform">
          <i data-lucide="book-open" class="text-slate-950 w-5 h-5"></i>
        </div>
        <span class="text-2xl font-light tracking-widest text-slate-100 uppercase">
          Hekima<span class="font-bold text-yellow-500">Ebooks</span>
        </span>
      </div>
      <div class="hidden md:flex gap-8 text-sm font-medium tracking-wide text-slate-400">
        <button onclick="app.navigate('home')" class="hover:text-yellow-400 transition-colors">Catalog</button>
        <button class="hover:text-yellow-400 transition-colors">My Library</button>
      </div>
    </div>
  </nav>

  <main id="main-content" class="pb-24"></main>
  <div id="modal-container"></div>

  <script>
    // ⚠️ CRITICAL: REPLACE WITH YOUR SUPABASE DETAILS ON GITHUB ⚠️
    const SUPABASE_URL = 'https://qdeyxhvjrwiexqemrvbb.supabase.co'; 
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkZXl4aHZqcndpZXhxZW1ydmJiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODUyMzQ5MSwiZXhwIjoyMDk0MDk5NDkxfQ.4jkdIIRS43aomjWLJTRQDJq0XnXk744QWB_UJbRu5uc';
    
    let supabaseClient;
    try {
      // Check if it's a real URL to prevent the preview crash
      if (SUPABASE_URL && SUPABASE_URL.startsWith('http')) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } else {
        console.warn("Supabase keys not set. Falling back to mock data for preview.");
      }
    } catch(err) {
      console.error("Supabase Initialization Error:", err);
    }

    let EBOOKS = []; // Will be populated from Database

    // --- APP LOGIC & STATE ---
    const app = {
      state: {
        view: 'home',
        selectedBookId: null,
        unlockedBooks: [],
        paymentMethod: 'mpesa',
        isProcessing: false,
        paymentMessage: '',
        pollingInterval: null,
        isLoadingBooks: true
      },

      async init() { 
        this.render(); // Show loader
        await this.fetchBooks();
        this.render(); // Show actual books
      },

      async fetchBooks() {
        if (!supabaseClient) {
          // If Supabase isn't connected yet, load some mock data for the preview
          EBOOKS = [
            {
              id: 'book-1',
              title: 'The Law of Attraction',
              author: 'Elias Thorne',
              price: 1, 
              category: 'Spirituality',
              iconName: 'sparkles',
              iconColor: 'text-yellow-400',
              coverGradient: 'from-yellow-900/60 to-slate-900',
              synopsis: 'Unlock the hidden geometry of the soul. This profound text bridges the gap between ancient esoteric traditions and modern quantum consciousness.',
              preview: `Chapter 1: The First Principle\n\nTo understand the nature of reality, one must first recognize that the observer and the observed are inexorably linked.`,
              fullText: `But this process requires more than passive sitting. It demands active engagement with the energetic currents of the body.\n\nChapter 2: The Ethereal Anatomy\nBeyond the physical flesh lies the subtle body—a network of nadis and meridians that carry the vital life force, or Prana.`,
              downloadUrl: 'https://qdeyxhvjrwiexqemrvbb.supabase.co/storage/v1/object/public/ebooks/Law%20of%20Attraction_%20The%20Secret%20Power%20of%20The%20Universe%20(Using%20Your%20Subconscious%20Mind,%20Visualization%20&%20Meditation%20for%20Manifesting%20Happiness,%20Love,%20Money%20&%20Success)%20Inspirational%20Self%20Help%20Book%20(%20PDFDrive%20).pdf'
            },
            {
              id: 'book-4', 
              title: "BABAJI'S KRIYA YOGA 144 TECHNIQUES", 
              author: 'BABAJI',
              price: 30, 
              category: 'Ancient Wisdom',
              iconName: 'sun', 
              iconColor: 'text-orange-400',
              coverGradient: 'from-orange-900 to-slate-900',
              synopsis: 'A short catchy description of the book for the details page.',
              preview: `Chapter 1\n\nThis is the free text they can read before the paywall.`,
              fullText: `This is the locked text that is blurred out until they pay.`,
              downloadUrl: "https://qdeyxhvjrwiexqemrvbb.supabase.co/storage/v1/object/public/ebooks/BABAJI'S%20KRIYA%20YOGA%20144%20TECHNIQUES%201..18%20ASANA%20(%20PDFDrive%20).pdf" 
            }
          ];
          this.state.isLoadingBooks = false;
          return;
        }

        try {
          // Fetch only published books from the Supabase table created via Admin Panel
          const { data, error } = await supabaseClient
            .from('ebooks')
            .select('*')
            .eq('is_published', true)
            .order('created_at', { ascending: false });

          if (error) throw error;

          const fallbackGradients = [
            'from-yellow-900/60 to-slate-900', 'from-emerald-900 to-slate-900',
            'from-indigo-900 to-slate-900', 'from-orange-900 to-slate-900'
          ];

          EBOOKS = data.map((b, index) => ({
            id: b.id,
            title: b.title,
            author: b.author,
            price: parseFloat(b.price) || 0,
            category: b.category || 'Ancient Wisdom',
            iconName: 'book', // Fallback icon
            iconColor: 'text-yellow-400',
            coverGradient: fallbackGradients[index % fallbackGradients.length],
            coverUrl: b.cover_url,
            synopsis: b.description || 'A sacred text awaiting your discovery.',
            preview: b.description ? `Preview:\n\n${b.description}` : `Chapter 1\n\nA preview is currently unavailable.`,
            fullText: `This is the locked text. Once unlocked, you will be able to download the full PDF below.`,
            downloadUrl: b.pdf_url || '#'
          }));
        } catch(e) {
          console.error("Failed to load books from database:", e);
        } finally {
          this.state.isLoadingBooks = false;
        }
      },

      navigate(view, bookId = null) {
        this.state.view = view;
        if (bookId) this.state.selectedBookId = bookId;
        window.scrollTo(0, 0);
        this.render();
      },

      unlockBook(bookId) {
        if (!this.state.unlockedBooks.includes(bookId)) this.state.unlockedBooks.push(bookId);
        this.closeModal();
        this.navigate('reader');
      },

      openModal() {
        this.state.paymentMethod = 'mpesa';
        this.state.paymentMessage = '';
        this.state.isProcessing = false;
        this.renderModal();
      },

      closeModal() {
        if (this.state.pollingInterval) clearInterval(this.state.pollingInterval);
        document.getElementById('modal-container').innerHTML = '';
      },

      async handlePayment(event, bookId) {
        event.preventDefault();
        let phone = document.getElementById('mpesa-phone').value.trim();
        if (phone.startsWith('0')) phone = '254' + phone.slice(1);
        if (phone.startsWith('+')) phone = phone.slice(1);
        if (!phone.startsWith('254')) phone = '254' + phone;

        this.state.isProcessing = true;
        this.state.paymentMessage = 'Initiating M-Pesa prompt...';
        this.renderModal();

        try {
          const book = this.getBook();
          const response = await fetch('/.netlify/functions/mpesa-stkpush', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phoneNumber: phone, amount: book.price, bookId: book.id })
          });
          const data = await response.json();
          if (data.success) {
            this.state.paymentMessage = 'Prompt sent! Please enter your M-Pesa PIN.';
            this.renderModal();
            this.pollTransactionStatus(data.checkoutRequestId, book.id);
          } else {
            throw new Error(data.error || 'Failed to initiate push');
          }
        } catch (error) {
          this.state.isProcessing = false;
          this.state.paymentMessage = `Error: ${error.message}`;
          this.renderModal();
        }
      },

      pollTransactionStatus(checkoutRequestId, bookId) {
        let attempts = 0;
        const maxAttempts = 30;
        this.state.pollingInterval = setInterval(async () => {
          attempts++;
          if (attempts > maxAttempts) {
            clearInterval(this.state.pollingInterval);
            this.state.isProcessing = false;
            this.state.paymentMessage = 'Payment timed out. Please try again.';
            this.renderModal();
            return;
          }
          try {
            const res = await fetch(`/.netlify/functions/check-status?id=${checkoutRequestId}`);
            const data = await res.json();
            if (data.status === 'SUCCESS') {
              clearInterval(this.state.pollingInterval);
              this.state.paymentMessage = 'Payment Successful! Unlocking...';
              this.renderModal();
              setTimeout(() => this.unlockBook(bookId), 1500);
            } else if (data.status === 'FAILED') {
              clearInterval(this.state.pollingInterval);
              this.state.isProcessing = false;
              this.state.paymentMessage = 'Payment failed or was cancelled.';
              this.renderModal();
            }
          } catch (err) {
            console.error("Polling error", err);
          }
        }, 3000);
      },

      getBook() { return EBOOKS.find(b => b.id === this.state.selectedBookId); },
      isUnlocked(bookId) { return this.state.unlockedBooks.includes(bookId); },

      render() {
        const main = document.getElementById('main-content');
        if (this.state.isLoadingBooks) {
           main.innerHTML = `<div class="h-96 flex flex-col items-center justify-center text-yellow-500 animate-pulse"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-4"></i><p>Consulting the archives...</p></div>`;
        } else if (EBOOKS.length === 0) {
           main.innerHTML = `<div class="h-96 flex flex-col items-center justify-center text-slate-500"><i data-lucide="book-x" class="w-10 h-10 mb-4"></i><p>No published books found in the database. Use the Admin panel to upload.</p></div>`;
        } else if (this.state.view === 'home') {
           main.innerHTML = this.getHomeHTML();
        } else if (this.state.view === 'details') {
           main.innerHTML = this.getDetailsHTML();
        } else if (this.state.view === 'reader') {
           main.innerHTML = this.getReaderHTML();
        }
        lucide.createIcons();
      },

      getCoverHtml(book) {
        if (book.coverUrl) {
          return `<img src="${book.coverUrl}" alt="${book.title}" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay hover:mix-blend-normal transition-all duration-300 opacity-80 group-hover:opacity-100" />`;
        }
        return `<i data-lucide="${book.iconName}" class="w-12 h-12 ${book.iconColor} z-10"></i><div class="mt-6 font-serif text-xl font-medium text-white/90 z-10 drop-shadow-md">${book.title}</div>`;
      },

      getHomeHTML() {
        const featuredBook = EBOOKS[0];
        const catalogHTML = EBOOKS.map(book => `
          <div onclick="app.navigate('details', '${book.id}')" class="group bg-slate-900/50 rounded-2xl p-4 border border-slate-800 hover:border-slate-700 transition-all duration-300 cursor-pointer flex flex-col">
            <div class="relative w-full h-64 rounded-xl mb-6 flex flex-col items-center justify-center p-6 text-center bg-gradient-to-br ${book.coverGradient} shadow-inner overflow-hidden border border-white/5">
              ${this.getCoverHtml(book)}
            </div>
            <div class="flex-grow">
              <div class="text-xs font-bold text-yellow-500 uppercase tracking-wider mb-2">${book.category}</div>
              <h3 class="text-xl font-bold mb-1 text-slate-100 group-hover:text-yellow-400 transition-colors line-clamp-1">${book.title}</h3>
              <p class="text-slate-400 text-sm mb-4">by ${book.author}</p>
            </div>
            <div class="flex items-center justify-between pt-4 border-t border-slate-800/50 mt-auto">
              <span class="font-semibold text-lg">KES ${book.price}</span>
              <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center group-hover:bg-yellow-500 group-hover:text-slate-950 transition-colors">
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
              </div>
            </div>
          </div>
        `).join('');

        return `
          <div class="animate-fade-in">
            <section class="relative overflow-hidden pt-20 pb-32">
              <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-yellow-900/20 via-slate-950 to-slate-950"></div>
              <div class="max-w-6xl mx-auto px-6 relative z-10 text-center md:text-left flex flex-col md:flex-row items-center gap-12">
                <div class="md:w-1/2">
                  <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-6">Unlock Ancient <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-600">Wisdom</span></h1>
                  <p class="text-lg text-slate-400 mb-8 leading-relaxed max-w-lg mx-auto md:mx-0">Deeply researched texts on spirituality, natural healing, and the forgotten histories of our world.</p>
                  <button onclick="document.getElementById('catalog').scrollIntoView({behavior: 'smooth'})" class="px-8 py-3.5 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-semibold rounded-full shadow-[0_0_20px_rgba(234,179,8,0.3)]">Explore Catalog</button>
                </div>
                <div class="md:w-1/2 flex justify-center mt-12 md:mt-0 relative group cursor-pointer" onclick="app.navigate('details', '${featuredBook.id}')">
                  <div class="absolute inset-0 bg-yellow-500/20 blur-3xl rounded-full scale-150 group-hover:bg-yellow-500/30 transition-all duration-500"></div>
                  <div class="relative w-64 h-96 rounded-xl shadow-2xl overflow-hidden transform group-hover:-translate-y-4 group-hover:rotate-2 transition-all duration-500 bg-gradient-to-br ${featuredBook.coverGradient} border border-yellow-800/30 flex flex-col items-center justify-center text-center p-6">
                    ${featuredBook.coverUrl ? `<img src="${featuredBook.coverUrl}" alt="Featured Book" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-80" />` : `<i data-lucide="${featuredBook.iconName}" class="w-16 h-16 ${featuredBook.iconColor} mb-6 z-10"></i>`}
                    <h3 class="text-2xl font-bold text-white mb-2 font-serif z-10 drop-shadow-md">${featuredBook.title}</h3>
                    <p class="text-yellow-300/90 text-sm z-10 drop-shadow-md">${featuredBook.author}</p>
                  </div>
                </div>
              </div>
            </section>
            <section class="max-w-6xl mx-auto px-6" id="catalog">
              <div class="flex items-end justify-between mb-12 border-b border-slate-800 pb-4">
                <h2 class="text-3xl font-light">The <span class="font-semibold text-yellow-500">Collection</span></h2>
                <span class="text-slate-500 text-sm uppercase tracking-widest">${EBOOKS.length} Volumes</span>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">${catalogHTML}</div>
            </section>
          </div>
        `;
      },

      getDetailsHTML() {
        const book = this.getBook();
        const unlocked = this.isUnlocked(book.id);
        return `
          <div class="max-w-5xl mx-auto px-6 pt-12 animate-slide-in-right">
            <button onclick="app.navigate('home')" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-12"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Catalog</button>
            <div class="flex flex-col md:flex-row gap-12 lg:gap-20">
              <div class="w-full md:w-1/3 flex-shrink-0">
                <div class="relative w-full aspect-[2/3] rounded-xl flex flex-col items-center justify-center p-8 text-center bg-gradient-to-br ${book.coverGradient} shadow-2xl border border-white/5 overflow-hidden">
                  ${book.coverUrl ? `<img src="${book.coverUrl}" alt="Cover" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay opacity-90" />` : `<i data-lucide="${book.iconName}" class="w-16 h-16 ${book.iconColor} z-10"></i>`}
                  <h2 class="mt-8 font-serif text-3xl font-bold text-white leading-tight z-10 drop-shadow-lg">${book.title}</h2>
                  <p class="mt-4 text-white/90 italic z-10 drop-shadow-lg">${book.author}</p>
                </div>
              </div>
              <div class="flex flex-col">
                <div class="inline-block px-3 py-1 rounded-full bg-slate-800 text-yellow-400 text-xs font-bold uppercase tracking-widest w-fit mb-6">${book.category}</div>
                <h1 class="text-4xl md:text-5xl font-bold mb-4 text-slate-50">${book.title}</h1>
                <p class="text-xl text-slate-400 mb-8">Authored by <span class="text-slate-200">${book.author}</span></p>
                <div class="prose prose-invert max-w-none text-slate-300 leading-relaxed mb-10"><p>${book.synopsis}</p></div>
                <div class="bg-slate-900/50 rounded-2xl p-6 border border-slate-800 mb-8 flex flex-col sm:flex-row items-center justify-between gap-6">
                  <div>
                    <p class="text-sm text-slate-400 mb-1">Investment in Knowledge</p>
                    <p class="text-3xl font-bold text-white">KES ${book.price}</p>
                  </div>
                  <div class="flex gap-4 w-full sm:w-auto">
                    ${unlocked ? `
                      <button onclick="app.navigate('reader')" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3.5 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-xl transition-colors"><i data-lucide="book-open" class="w-5 h-5"></i> Read Full Book</button>
                    ` : `
                      <button onclick="app.navigate('reader')" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-6 py-3.5 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-xl border border-slate-700"><i data-lucide="book" class="w-5 h-5 text-slate-400"></i> Preview</button>
                      <button onclick="app.openModal()" class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-8 py-3.5 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold rounded-xl shadow-lg shadow-yellow-900/20"><i data-lucide="lock" class="w-5 h-5"></i> Unlock Now</button>
                    `}
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      },

      getReaderHTML() {
        const book = this.getBook();
        const unlocked = this.isUnlocked(book.id);
        return `
          <div class="max-w-4xl mx-auto px-6 pt-8 animate-fade-in">
            <div class="flex items-center justify-between pb-6 border-b border-slate-800/60 mb-10 sticky top-20 bg-slate-950/90 backdrop-blur z-30 pt-4">
              <button onclick="app.navigate('details')" class="flex items-center gap-2 text-slate-400 hover:text-white"><i data-lucide="arrow-left" class="w-4 h-4"></i> Exit Reader</button>
              <div class="text-center">
                <h2 class="font-bold text-slate-200">${book.title}</h2>
                <p class="text-xs text-slate-500 uppercase tracking-widest">${unlocked ? 'Full Text' : 'Preview Mode'}</p>
              </div>
              <div>
                ${unlocked && book.downloadUrl !== '#' ? `<a href="${book.downloadUrl}" target="_blank" class="flex items-center gap-2 text-yellow-500 hover:text-yellow-400 text-sm font-medium bg-yellow-500/10 px-4 py-2 rounded-lg border border-yellow-500/20"><i data-lucide="download" class="w-4 h-4"></i> Download PDF</a>` : `<div></div>`}
              </div>
            </div>
            <div class="relative font-serif text-lg leading-loose text-slate-300 md:text-xl md:leading-[2.2]">
              <div class="whitespace-pre-wrap">${book.preview}</div>
              ${!unlocked ? `
                <div class="relative mt-4">
                  <div class="whitespace-pre-wrap blur-text" aria-hidden="true">${book.fullText}</div>
                  <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent flex flex-col items-center justify-end pb-20">
                    <div class="bg-slate-900/90 border border-yellow-900/50 p-8 rounded-2xl max-w-md text-center shadow-2xl backdrop-blur-md">
                      <i data-lucide="lock" class="w-12 h-12 text-yellow-500 mx-auto mb-4"></i>
                      <h3 class="text-2xl font-bold text-white mb-3">Keep Reading</h3>
                      <p class="text-slate-400 text-sm mb-6">Unlock the complete wisdom to download the full PDF.</p>
                      <button onclick="app.openModal()" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold rounded-xl flex items-center justify-center gap-2">Pay KES ${book.price} to Unlock</button>
                    </div>
                  </div>
                </div>
              ` : `
                <div class="whitespace-pre-wrap mt-4 animate-slide-in-bottom">${book.fullText}
                  <div class="my-20 flex flex-col items-center justify-center p-12 border border-slate-800 rounded-2xl bg-slate-900/30">
                    <i data-lucide="sparkles" class="w-8 h-8 text-yellow-500 mb-4"></i>
                    <h4 class="text-xl font-sans font-bold text-white mb-2">Book Unlocked</h4>
                    <p class="text-sans text-slate-400 text-sm text-center mb-6">Click below to download the full text.</p>
                    <a href="${book.downloadUrl}" target="_blank" class="px-8 py-3.5 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold rounded-xl flex items-center gap-2"><i data-lucide="download" class="w-5 h-5"></i> Download PDF</a>
                  </div>
                </div>
              `}
            </div>
          </div>
        `;
      },

      renderModal() {
        const book = this.getBook();
        const container = document.getElementById('modal-container');
        const processing = this.state.isProcessing;
        const msg = this.state.paymentMessage;

        container.innerHTML = `
          <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm animate-fade-in" onclick="app.closeModal()"></div>
            <div class="relative w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden animate-zoom-in">
              <div class="p-6 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">Complete Purchase</h3>
                <button onclick="app.closeModal()" ${processing ? 'disabled' : ''} class="text-slate-500 hover:text-white transition-colors disabled:opacity-50"><i data-lucide="x" class="w-5 h-5"></i></button>
              </div>
              <div class="p-6 bg-slate-800/30 border-b border-slate-800 flex items-center justify-between">
                <div class="flex flex-col"><span class="text-sm text-slate-400">Unlocking</span><span class="font-semibold text-slate-200 line-clamp-1">${book.title}</span></div>
                <div class="text-right flex-shrink-0 ml-4"><span class="block text-sm text-slate-400">Total</span><span class="font-bold text-yellow-500 text-lg">KES ${book.price}</span></div>
              </div>
              <div class="p-6">
                ${msg ? `
                  <div class="mb-6 p-4 rounded-xl bg-slate-800 border border-yellow-900/50 text-center animate-fade-in">
                     <p class="text-sm font-bold text-yellow-400">${msg}</p>
                     ${processing && !msg.includes('Error') && !msg.includes('Failed') ? '<div class="mt-3 flex justify-center"><svg class="animate-spin h-6 w-6 text-yellow-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></div>' : ''}
                  </div>
                ` : ''}
                <form onsubmit="app.handlePayment(event, '${book.id}')" class="${msg && processing ? 'hidden' : 'block'}">
                  <div class="space-y-4 mb-8">
                    <div>
                      <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wide">M-Pesa Number</label>
                      <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">+254</span>
                        <input type="text" id="mpesa-phone" placeholder="7XX XXX XXX" required ${processing ? 'disabled' : ''} class="w-full bg-slate-950 border border-slate-700 rounded-xl py-3 pl-14 pr-4 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all placeholder:text-slate-600 disabled:opacity-50" />
                      </div>
                    </div>
                  </div>
                  <button type="submit" ${processing ? 'disabled' : ''} class="w-full py-3.5 rounded-xl font-bold transition-all flex items-center justify-center gap-2 ${processing ? 'bg-slate-700 text-slate-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_15px_rgba(5,150,105,0.3)]'}">
                    Pay KES ${book.price}
                  </button>
                </form>
              </div>
            </div>
          </div>
        `;
        lucide.createIcons();
      }
    };

    document.addEventListener('DOMContentLoaded', () => app.init());
  </script>
</body>
</html>
