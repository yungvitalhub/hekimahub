<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hekima Ebooks - Ancient Wisdom & Spirituality</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideInBottom { from { transform: translateY(2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.7s ease-out forwards; }
    .animate-slide-in-right { animation: slideInRight 0.5s ease-out forwards; }
    .animate-slide-in-bottom { animation: slideInBottom 0.8s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #334155; }
    .blur-text { filter: blur(5px); opacity: 0.4; user-select: none; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-yellow-500/30 min-h-screen">

  <nav class="sticky top-0 z-40 w-full backdrop-blur-md bg-slate-950/80 border-b border-slate-800/50">
    <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center gap-2 cursor-pointer group" onclick="app.navigate('home')">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center shadow-lg shadow-yellow-900/20 group-hover:scale-105 transition-transform">
          <i data-lucide="book-open" class="text-slate-950 w-5 h-5"></i>
        </div>
        <span class="text-2xl font-light tracking-widest text-slate-100 uppercase">Hekima<span class="font-bold text-yellow-500">Ebooks</span></span>
      </div>
      <div class="hidden md:flex gap-8 text-sm font-medium tracking-wide text-slate-400">
        <button onclick="app.navigate('home')" class="hover:text-yellow-400 transition-colors">Catalog</button>
        <button class="hover:text-yellow-400 transition-colors">My Library</button>
      </div>
    </div>
  </nav>

  <main id="main-content" class="pb-24"></main>
  <div id="modal-container"></div>

  <script>
    const EBOOKS = [
      {
        id: 'book-1',
        title: 'The Law of Attraction',
        author: 'Elias Thorne',
        price: 1, // Set to 1 KES for live Daraja testing
        category: 'Spirituality',
        iconName: 'sparkles',
        iconColor: 'text-yellow-400',
        coverGradient: 'from-yellow-900/60 to-slate-900',
        synopsis: 'Unlock the hidden geometry of the soul. This profound text bridges the gap between ancient esoteric traditions and modern quantum consciousness.',
        preview: `Chapter 1: The First Principle\n\nTo understand the nature of reality, one must first recognize that the observer and the observed are inexorably linked...`,
        fullText: `But this process requires more than passive sitting. It demands active engagement with the energetic currents of the body.\n\nChapter 2: The Ethereal Anatomy\nBeyond the physical flesh lies the subtle body—a network of nadis and meridians that carry the vital life force... [Full Book Content]`,
        downloadLink: 'https://qdeyxhvjrwiexqemrvbb.supabase.co/storage/v1/object/public/ebooks/Law%20of%20Attraction_%20The%20Secret%20Power%20of%20The%20Universe%20(Using%20Your%20Subconscious%20Mind,%20Visualization%20&%20Meditation%20for%20Manifesting%20Happiness,%20Love,%20Money%20&%20Success)%20Inspirational%20Self%20Help%20Book%20(%20PDFDrive%20).pdf'
      }
    ];

    const app = {
      state: {
        view: 'home',
        selectedBookId: null,
        unlockedBooks: [],
        paymentMethod: 'mpesa',
        isProcessing: false,
        paymentMessage: '',
        pollingInterval: null
      },

      init() { this.render(); },

      navigate(view, bookId = null) {
        this.state.view = view;
        if (bookId) this.state.selectedBookId = bookId;
        window.scrollTo(0, 0);
        this.render();
      },

      unlockBook(bookId) {
        if (!this.state.unlockedBooks.includes(bookId)) this.state.unlockedBooks.push(bookId);
        this.closeModal();
        this.navigate('reader');
      },

      openModal() {
        this.state.paymentMethod = 'mpesa';
        this.state.paymentMessage = '';
        this.state.isProcessing = false;
        this.renderModal();
      },

      closeModal() {
        if (this.state.pollingInterval) clearInterval(this.state.pollingInterval);
        document.getElementById('modal-container').innerHTML = '';
      },

      setPaymentMethod(method) {
        if (this.state.isProcessing) return;
        this.state.paymentMethod = method;
        this.renderModal();
      },

      async handlePayment(event, bookId) {
        event.preventDefault();
        
        let phone = document.getElementById('mpesa-phone').value.trim();
        // Format to 254XXXXXXXXX
        if (phone.startsWith('0')) phone = '254' + phone.slice(1);
        if (phone.startsWith('+')) phone = phone.slice(1);
        if (!phone.startsWith('254')) phone = '254' + phone;

        this.state.isProcessing = true;
        this.state.paymentMessage = 'Initiating M-Pesa prompt...';
        this.renderModal();

        try {
          const book = this.getBook();
          // Call our new Netlify Backend Function!
          const response = await fetch('/.netlify/functions/mpesa-stkpush', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phoneNumber: phone, amount: book.price, bookId: book.id })
          });

          const data = await response.json();

          if (data.success) {
            this.state.paymentMessage = 'Prompt sent! Please enter your M-Pesa PIN.';
            this.renderModal();
            // Start checking Supabase to see if the user paid
            this.pollTransactionStatus(data.checkoutRequestId, book.id);
          } else {
            throw new Error(data.error || 'Failed to initiate STK Push');
          }
        } catch (error) {
          this.state.isProcessing = false;
          this.state.paymentMessage = `Error: ${error.message}`;
          this.renderModal();
        }
      },

      pollTransactionStatus(checkoutRequestId, bookId) {
        let attempts = 0;
        const maxAttempts = 30; // Stop after 90 seconds (30 * 3 seconds)

        this.state.pollingInterval = setInterval(async () => {
          attempts++;
          if (attempts > maxAttempts) {
            clearInterval(this.state.pollingInterval);
            this.state.isProcessing = false;
            this.state.paymentMessage = 'Payment timed out. Please try again.';
            this.renderModal();
            return;
          }

          try {
            // Ask our backend if the webhook received a success message
            const res = await fetch(`/.netlify/functions/check-status?id=${checkoutRequestId}`);
            const data = await res.json();

            if (data.status === 'SUCCESS') {
              clearInterval(this.state.pollingInterval);
              this.state.paymentMessage = 'Payment Successful! Unlocking...';
              this.renderModal();
              setTimeout(() => this.unlockBook(bookId), 1500); // Unlock the PDF
            } else if (data.status === 'FAILED') {
              clearInterval(this.state.pollingInterval);
              this.state.isProcessing = false;
              this.state.paymentMessage = 'Payment was cancelled or failed.';
              this.renderModal();
            }
          } catch (err) {
            console.error("Polling error", err);
          }
        }, 3000); // Check every 3 seconds
      },

      getBook() { return EBOOKS.find(b => b.id === this.state.selectedBookId); },
      isUnlocked(bookId) { return this.state.unlockedBooks.includes(bookId); },

      render() {
        const main = document.getElementById('main-content');
        if (this.state.view === 'home') main.innerHTML = this.getHomeHTML();
        else if (this.state.view === 'details') main.innerHTML = this.getDetailsHTML();
        else if (this.state.view === 'reader') main.innerHTML = this.getReaderHTML();
        lucide.createIcons();
      },

      getHomeHTML() {
        const book = EBOOKS[0];
        return `
          <div class="animate-fade-in max-w-6xl mx-auto px-6 pt-20">
             <div onclick="app.navigate('details', '${book.id}')" class="group bg-slate-900/50 rounded-2xl p-4 border border-slate-800 hover:border-yellow-500 transition-all duration-300 cursor-pointer flex flex-col text-center w-full max-w-sm mx-auto">
              <i data-lucide="${book.iconName}" class="w-12 h-12 ${book.iconColor} mx-auto mb-4"></i>
              <h3 class="text-2xl font-bold mb-1 text-slate-100">${book.title}</h3>
              <span class="font-semibold text-lg text-yellow-500 mt-4">KES ${book.price}</span>
            </div>
          </div>
        `;
      },

      getDetailsHTML() {
        const book = this.getBook();
        return `
          <div class="max-w-3xl mx-auto px-6 pt-20 text-center animate-slide-in-right">
             <button onclick="app.navigate('home')" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-12 mx-auto"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
             <h1 class="text-5xl font-bold mb-4 text-slate-50">${book.title}</h1>
             <p class="text-3xl font-bold text-yellow-500 mb-8">KES ${book.price}</p>
             <button onclick="app.navigate('reader')" class="px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold rounded-xl transition-colors shadow-lg shadow-yellow-900/20">Read Preview & Buy</button>
          </div>
        `;
      },

      getReaderHTML() {
        const book = this.getBook();
        const unlocked = this.isUnlocked(book.id);
        return `
          <div class="max-w-4xl mx-auto px-6 pt-8 animate-fade-in">
            <div class="flex items-center justify-between pb-6 border-b border-slate-800/60 mb-10">
              <button onclick="app.navigate('details')" class="flex items-center gap-2 text-slate-400 hover:text-white"><i data-lucide="arrow-left" class="w-4 h-4"></i> Exit Reader</button>
              ${unlocked ? `<a href="${book.downloadLink}" target="_blank" class="flex items-center gap-2 text-yellow-500 bg-yellow-500/10 px-4 py-2 rounded-lg"><i data-lucide="download" class="w-4 h-4"></i> Download PDF</a>` : ''}
            </div>
            <div class="relative font-serif text-lg leading-loose text-slate-300">
              <div class="whitespace-pre-wrap">${book.preview}</div>
              ${!unlocked ? `
                <div class="relative mt-4">
                  <div class="whitespace-pre-wrap blur-text select-none">${book.fullText}</div>
                  <div class="absolute inset-0 bg-gradient-to-t from-slate-950 flex items-end justify-center pb-20">
                      <button onclick="app.openModal()" class="w-full max-w-md py-4 bg-yellow-500 text-slate-950 font-bold rounded-xl shadow-2xl flex items-center justify-center gap-2">
                        <i data-lucide="lock" class="w-5 h-5"></i> Pay KES ${book.price} to Unlock
                      </button>
                  </div>
                </div>
              ` : `<div class="whitespace-pre-wrap mt-4">${book.fullText}</div>`}
            </div>
          </div>
        `;
      },

      renderModal() {
        const book = this.getBook();
        const container = document.getElementById('modal-container');
        const processing = this.state.isProcessing;
        const msg = this.state.paymentMessage;

        container.innerHTML = `
          <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="app.closeModal()"></div>
            <div class="relative w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6">
              <h3 class="text-lg font-bold text-white mb-4">Complete Purchase</h3>
              ${msg ? `<div class="mb-6 p-3 rounded bg-slate-800 text-yellow-400 text-center text-sm font-medium border border-yellow-900/50">${msg}</div>` : ''}
              
              <form onsubmit="app.handlePayment(event, '${book.id}')">
                <div class="mb-6">
                  <label class="block text-xs text-slate-400 mb-1.5 uppercase">M-Pesa Number</label>
                  <input type="text" id="mpesa-phone" placeholder="07XX XXX XXX" required ${processing ? 'disabled' : ''} class="w-full bg-slate-950 border border-slate-700 rounded-xl py-3 px-4 text-white focus:border-emerald-500 disabled:opacity-50" />
                </div>
                <button type="submit" ${processing ? 'disabled' : ''} class="w-full py-3.5 rounded-xl font-bold transition-all bg-emerald-600 hover:bg-emerald-500 text-white disabled:opacity-50 disabled:cursor-not-allowed">
                  ${processing ? 'Processing...' : `Pay KES ${book.price}`}
                </button>
                ${processing ? `<button type="button" onclick="app.closeModal()" class="w-full mt-3 py-2 text-slate-500 text-sm">Cancel</button>` : ''}
              </form>
            </div>
          </div>
        `;
        lucide.createIcons();
      }
    };
    document.addEventListener('DOMContentLoaded', () => app.init());
  </script>
</body>
</html>
